<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Potencializa é uma agência premium de marketing digital e produção audiovisual. Estruturas de marca e campanhas que impulsionam crescimento em Portugal, Brasil e Estados Unidos." />
    <meta name="theme-color" content="#0f0720" />
    <title>Potencializa | Agência de Marketing Digital</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const isGitHubPages =
        location.hostname.endsWith("github.io") &&
        location.pathname.startsWith("/Potencializa/");

      if (isGitHubPages) {
        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = "/Potencializa/assets/main.css";
        document.head.appendChild(stylesheet);

        const appScript = "/Potencializa/assets/main.js";
        import(appScript);
      } else {
        import("/src/main.jsx");
      }
    </script>
  </body>
</html>
